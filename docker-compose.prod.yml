services:
  backend:
    build: ./backend
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app_net
    restart: unless-stopped

  frontend:
    build: ./frontend
    env_file: .env
    depends_on:
      - backend
    networks:
      - app_net
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    env_file: .env
    depends_on:
      - frontend
      - backend
    networks:
      - app_net
    restart: unless-stopped

networks:
  app_net:
    driver: bridge
